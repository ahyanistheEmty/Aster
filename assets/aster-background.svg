<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="gm" cx="0%" cy="100%" r="110%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#636ff1" stop-opacity="0.6"/>
      <stop offset="45%" stop-color="#636ff1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#636ff1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gs" cx="100%" cy="0%" r="65%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#636ff1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#636ff1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gc" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#636ff1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#636ff1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="0.9" fill="#ffffff" fill-opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="#000000"/>

  <!-- Gradient glows -->
  <rect width="1920" height="1080" fill="url(#gm)"/>
  <rect width="1920" height="1080" fill="url(#gs)"/>
  <rect width="1920" height="1080" fill="url(#gc)"/>

  <!-- Dot grid -->
  <rect width="1920" height="1080" fill="url(#dots)"/>

  <!-- Concentric rings from bottom-left glow -->
  <circle cx="0" cy="1080" r="280" fill="none" stroke="#636ff1" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="0" cy="1080" r="460" fill="none" stroke="#636ff1" stroke-opacity="0.08" stroke-width="0.8"/>
