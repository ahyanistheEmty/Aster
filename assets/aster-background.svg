  <circle cx="0" cy="1080" r="880" fill="none" stroke="#636ff1" stroke-opacity="0.03" stroke-width="0.6"/>
  <circle cx="0" cy="1080" r="1100" fill="none" stroke="#636ff1" stroke-opacity="0.02" stroke-width="0.5"/>

  <!-- Rings from top-right glow -->
  <circle cx="1920" cy="0" r="220" fill="none" stroke="#636ff1" stroke-opacity="0.07" stroke-width="0.7"/>
  <circle cx="1920" cy="0" r="400" fill="none" stroke="#636ff1" stroke-opacity="0.04" stroke-width="0.5"/>

